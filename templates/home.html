<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TODO LIST - Home</title>
  <style>
    /* Bootstrap core essentials */
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; font-size: 14px; color: #212529; background-color: #fff; }
    .container { width: 100%; max-width: 1140px; margin: 0 auto; padding: 0 15px; }
    .row { display: flex; flex-wrap: wrap; margin: 0 -15px; }
    .col-md-6 { flex: 0 0 50%; max-width: 50%; padding: 0 15px; }
    .p-0 { padding: 0 !important; }
    .mt-5 { margin-top: 3rem !important; }
    .mb-4 { margin-bottom: 1.5rem !important; }
    .m-1 { margin: 0.25rem !important; }
    .text-center { text-align: center; }
    .text-muted { color: #6c757d !important; }

    /* Card */
    .card { position: relative; display: flex; flex-direction: column; background-color: #fff; border: 1px solid rgba(0,0,0,.125); border-radius: 0.25rem; margin-bottom: 4px; }
    .card-body { flex: 1 1 auto; padding: 0.75rem 1.25rem; display: flex; justify-content: space-between; align-items: center; }

    /* Buttons */
    .btn { display: inline-block; font-weight: 400; text-align: center; border: 1px solid transparent; padding: 0.375rem 0.75rem; font-size: 14px; border-radius: 0.25rem; cursor: pointer; color: #fff; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 12px; border-radius: 0.2rem; }
    .btn-success { background-color: #28a745; border-color: #28a745; }
    .btn-success:hover { background-color: #218838; }
    .btn-danger { background-color: #dc3545; border-color: #dc3545; }
    .btn-danger:hover { background-color: #c82333; }
    .btn-primary { background-color: #007bff; border-color: #007bff; }
    .btn-primary:hover { background-color: #0069d9; }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    .form-control { display: block; width: 100%; padding: 0.375rem 0.75rem; font-size: 14px; line-height: 1.5; color: #495057; background-color: #fff; border: 1px solid #ced4da; border-radius: 0.25rem; outline: none; }
    .form-control:focus { border-color: #80bdff; box-shadow: 0 0 0 0.2rem rgba(0,123,255,0.25); }

    /* Flex helpers */
    .d-flex { display: flex !important; }
    .justify-content-between { justify-content: space-between !important; }
    .align-items-center { align-items: center !important; }

    /* Button gap */
    .btn + .btn { margin-left: 4px; }

    /* Section spacing */
    .task-section { margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container mt-5">

    <h3 class="text-center mb-4">Django ToDo App</h3>

    <div class="row">

      <!-- Left: My Day + Active Tasks -->
      <div class="col-md-6 p-0">
        <h4>My Day</h4>
        <p class="text-muted">{% now "F Y" %}</p>

        <!-- Active Task List -->
        <div id="task-list">
          {% for task in tasks %}
          <div class="card m-1" id="task-1">
            <div class="card-body">
              <span class="task-text">{{task.task}}</span>
              <span>
                <button class="btn btn-success btn-sm" onclick="markDone('task-1')">&#10003; Mark as Done</button>
                <button class="btn btn-danger btn-sm" onclick="deleteTask('task-1')">&#128465;</button>
                <button class="btn btn-primary btn-sm" onclick="editTask('task-1')">&#9998;</button>
              </span>
            </div>
          </div>
          {% endfor %}
        </div>

        <!-- Add Task Form -->
        <div class="task-section">
         <form action="{% url 'addTask' %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
              <span style="display: flex;">
                <input type="text" name="task" class="form-control" placeholder="Add a task" />
                <button type="submit" class="btn btn-primary" style="width: 200px;">
                  <i class="fa fa-plus"></i> Add
                </button>
              </span>
            </div>
        </form>
        </div>
      </div>

      <!-- Right: Completed Tasks -->
      <div class="col-md-6">
        <h5>Completed Tasks</h5>
        <div id="completed-list">
          <div class="card m-1">
            <div class="card-body">
              This is the completed task.
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    var taskCount = 2;

    function addTask(e) {
      e.preventDefault();
      var input = document.getElementById('new-task');
      var text = input.value.trim();
      if (!text) return;

      var id = 'task-' + taskCount++;
      var div = document.createElement('div');
      div.className = 'card m-1';
      div.id = id;
      div.innerHTML =
        '<div class="card-body">' +
          '<span class="task-text">' + text + '</span>' +
          '<span>' +
            '<button class="btn btn-success btn-sm" onclick="markDone(\'' + id + '\')">&#10003; Mark as Done</button> ' +
            '<button class="btn btn-danger btn-sm" onclick="deleteTask(\'' + id + '\')">&#128465;</button> ' +
            '<button class="btn btn-primary btn-sm" onclick="editTask(\'' + id + '\')">&#9998;</button>' +
          '</span>' +
        '</div>';
      document.getElementById('task-list').appendChild(div);
      input.value = '';
      input.focus();
    }

    function deleteTask(id) {
      var el = document.getElementById(id);
      if (el) el.remove();
    }

    function editTask(id) {
      var card = document.getElementById(id);
      var span = card.querySelector('.task-text');
      var val = prompt('Edit task:', span.textContent);
      if (val && val.trim()) span.textContent = val.trim();
    }

    function markDone(id) {
      var card = document.getElementById(id);
      var name = card.querySelector('.task-text').textContent;
      card.remove();

      var div = document.createElement('div');
      div.className = 'card m-1';
      div.innerHTML = '<div class="card-body">' + name + '</div>';
      document.getElementById('completed-list').appendChild(div);
    }
  </script>

</body>
</html>
